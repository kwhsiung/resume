name: Build resume

on:
  push:
    branches: [main]
    paths:
      - 'resume.md'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/build-resume.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate resume.html and resume.pdf
        run: npm run build

      - name: Commit regenerated files
        run: |
          if [[ -n "$(git status --porcelain resume.html resume.pdf)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add resume.html resume.pdf
            git commit -m "chore: regenerate resume.html and resume.pdf [skip ci]"
            git push
          else
            echo "No changes to resume.html or resume.pdf."
          fi
